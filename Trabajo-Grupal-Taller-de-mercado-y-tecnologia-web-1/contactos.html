        <main>
            <h2>Sumate como voluntari@!</h2>
            <p>Completa el fomulario:</p>

            <form action="#" method="post">
                <div class="form-group">
                    <label for="nombre">Nombre y apellido:</label>
                    <input type="text" id="nombre" name="nombre" placeholder="Ej: Marcos Navallas" required>
                </div>

                <div class="form-group">
                    <label for="email">Correo electrónico:</label>
                    <input type="email" id="email" name="email" placeholder="Ej: marconav@migmail.com" required>
                </div>

                <div class="form-group">
                    <label for="telefono">Teléfono:</label>
                    <input type="tel" id="telefono" name="telefono" placeholder="Ej: +54 11 7896 0685">
                </div>
                
                <br>
                <label for="programa">Programa de interes</label>
                <select type="programa" id="programa">
                    <option value="pp">psicologia clinica y Psicoterapia</option>
                    <option value="sc">Psicologia social y comunitaria</option>
                    <option value="tt">tratamiento de trauma infanto-juvenil</option>
            </form>
        </main>

        <footer>
            <p><strong>a nosotros desde:</strong></p>

            <p>Te esperamos!</p>
            
        </footer>
